<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Archives</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r/mn-res/main/head_12.png">
    <style>
/* ===== THEMES & VARIABLES ===== */
:root {
  --nikki-pink: #ff85ba;
  --glass-bg: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(255, 255, 255, 0.6);
  --text-main: #5d4157;
}

body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at top right, #fff0f6, transparent), #ffe4f0;
  background-attachment: fixed;
  color: var(--text-main);
}

/* ===== HEADER ===== */
header {
  padding: 20px;
  text-align: center;
  font-family: "Georgia", serif;
  font-weight: bold;
  font-size: 24px;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(8px); /* Blur is fine here, it's only one element */
  color: var(--nikki-pink);
  border-bottom: 2px solid var(--glass-border);
}

/* ===== TOP BAR ===== */
.topbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  flex-wrap: wrap;
}

input, select {
  padding: 10px 15px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: white;
  color: var(--text-main);
  outline: none;
  font-size: 14px;
}

.cart-btn, .small-btn {
  background: linear-gradient(135deg, #ff85ba, #ffb3d9);
  color: white; border: none; padding: 10px 18px; border-radius: 20px;
  font-weight: bold; cursor: pointer;
}

/* ===== SUIT GRID ===== */
.suit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* Slightly smaller for mobile */
  gap: 15px;
  padding: 15px;
}

/* ===== SUIT CARD (Mobile Optimized) ===== */
.suit-card {
  /* Removed backdrop-filter to drastically improve mobile FPS */
  background: rgba(255, 255, 255, 0.5); 
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 20px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  
  /* Sorting logic */
  order: 100;
  opacity: 0.65;
  transition: opacity 0.3s ease, transform 0.2s ease;
  will-change: opacity, transform; /* GPU hint */
}

/* Push found images to the top naturally */
.suit-card.has-image {
  order: 1;
  opacity: 1;
  background: rgba(255, 255, 255, 0.9);
}

.suit-card:active {
  transform: scale(0.97); /* Better mobile tap feedback */
}

.suit-card img {
  width: 100%;
  height: 160px; /* Shorter to fit more on screen */
  object-fit: contain;
  border-radius: 12px;
  margin-bottom: 8px;
  background: rgba(255, 255, 255, 0.4);
}

/* ===== MODAL ===== */
.modal {
  display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
  background: rgba(255, 182, 193, 0.5); backdrop-filter: blur(5px);
  justify-content: center; align-items: center;
}
.modal-content {
  background: white; padding: 20px; border-radius: 25px;
  width: 95%; max-width: 900px; max-height: 85vh; overflow-y: auto;
}
.parts-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px;
}
.part-card {
  background: #fdf5f8; border-radius: 15px; padding: 8px; border: 1px solid #ffe4f0; text-align: center;
}
.part-card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 5px;}
.btn-group { display: flex; gap: 5px; width: 100%; justify-content: center; }

/* ===== CART PANEL ===== */
.cart-panel {
  display: none; position: fixed; right: 0; top: 0; width: 100%; max-width: 300px; height: 100%;
  background: white; border-left: 3px solid var(--nikki-pink); padding: 20px; z-index: 2000; box-sizing: border-box; overflow-y: auto;
}
.cart-item { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ffd1e3; padding: 10px 0; }
.cart-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 8px; flex-shrink: 0;}
.trash { cursor: pointer; margin-left: auto; }

/* Invisible trigger for Infinite Scroll */
#sentinel { width: 100%; height: 20px; }
    </style>
</head>
<body>

<header>HDA Archives</header>

<div class="topbar">
    <input type="text" id="search" placeholder="Search suit..." oninput="searchSuit()">
    <select id="filter" onchange="filterSuit()">
    <option value="All">All</option>
    <option value="Classic">Classic</option>
    <option value="Luxury">Luxury</option>
    <option value="Time Memories">Time Memories</option>
    <option value="Apple">Apple</option>
    <option value="Lilith">Lilith</option>
    <option value="Cloud">Cloud</option>
    <option value="Pigeon">Pigeon</option>
    <option value="North">North</option>
    <option value="Wasteland">Wasteland</option>
    <option value="Ruin">Ruin</option>
  </select>
    <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

<div class="suit-grid" id="suitGrid"></div>
<!-- Sentinel for Infinite Scroll -->
<div id="sentinel"></div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="suitTitle" style="margin-top:0;"></h3>
        <button class="small-btn" style="margin-bottom:10px; width:100%;" onclick="downloadSuit()">Download Full Suit</button>
        <div class="parts-grid" id="partsGrid"></div>
    </div>
</div>

<!-- Cart Panel -->
<div class="cart-panel" id="cartPanel">
    <h3>My Cart</h3>
    <div id="cartItems"></div>
    <button class="small-btn" style="width:100%; margin-top:10px;" onclick="downloadCart()">Download Cart</button>
    <button class="small-btn" style="width:100%; margin-top:10px; background:#ccc;" onclick="toggleCart()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let suits = [];
let displayedSuits = []; // The currently filtered list
let cart = new Map();
let currentSuit = null;

// Infinite Scroll state
let currentRenderLimit = 0;
const CHUNK_SIZE = 40; // Load 40 items at a time to keep mobile fast

const BASE_USER = "https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r";
const REPOS = ["mn-res-b1", "mn-res-b2", "mn-res-b3"]; 
const VARIANTS = ["-1", "-2", "-3", "-4", "-5", "-6", "-7", "-8", "-9", "-13", "-101", "-201", "-301", "-701", "-901"];

/* =========================
   👀 LAZY LOADING OBSERVER 
========================= */
const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            const suitId = img.dataset.id;
            const card = img.closest('.suit-card'); 
            
            findImage(suitId, true, "", (foundUrl) => {
                img.src = foundUrl;
                img.style.opacity = 1;
                if (card) card.classList.add('has-image'); // Pushes to top of the grid safely
            });
            
            observer.unobserve(img); 
        }
    });
}, { rootMargin: "150px" }); // Kept moderate so it doesn't spam mobile networks

/* =========================
   📜 INFINITE SCROLL OBSERVER
========================= */
const scrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
        renderChunk();
    }
}, { rootMargin: "200px" });

/* =========================
   🔍 SMART FINDER
========================= */
function findImage(id, isSuit, variant, callback) {
    const folder = isSuit ? "suits" : "parts";
    let repoIndex = 0;

    function tryNextRepo() {
        if (repoIndex >= REPOS.length) return;
        const url = `${BASE_USER}/${REPOS[repoIndex]}/main/images/${folder}/${id}${variant}.png`;
        const img = new Image();
        img.onload = () => callback(url);
        img.onerror = () => { repoIndex++; tryNextRepo(); };
        img.src = url;
    }
    tryNextRepo();
}

/* =========================
   📦 INITIAL LOAD
========================= */
fetch("data.json").then(r => r.json()).then(data => {
    suits = data;
    displayedSuits = suits; // Set initial state
    renderChunk(true); // Render first batch
    loadCart();
    scrollObserver.observe(document.getElementById("sentinel")); // Start watching for bottom of page
});

/* =========================
    🖼 SUIT GRID RENDERER
========================= */
function renderChunk(reset = false) {
    const grid = document.getElementById("suitGrid");
    
    if (reset) {
        grid.innerHTML = "";
        currentRenderLimit = 0;
    }

    // Get the next batch of 40 suits
    const toRender = displayedSuits.slice(currentRenderLimit, currentRenderLimit + CHUNK_SIZE);
    if (toRender.length === 0) return;

    toRender.forEach(s => {
        if (!s || !s.id) return;
        
        const card = document.createElement("div");
        card.className = "suit-card";
        const name = s.names?.en || s.names?.cn || s.name || s.SuitName || "Unnamed Suit";

        card.innerHTML = `
            <img data-id="${s.id}" style="opacity: 0; transition: opacity 0.3s;" alt="${name}">
            <div style="font-weight:bold; font-size: 13px;">${name}</div>
        `;
        card.onclick = () => openSuit(s);
        grid.appendChild(card);

        // Observe new images
        imageObserver.observe(card.querySelector('img'));
    });

    currentRenderLimit += CHUNK_SIZE;
}

/* =========================
   UI HELPERS (Search & Filter)
========================= */
function searchSuit() {
    const q = document.getElementById("search").value.toLowerCase();
    displayedSuits = suits.filter(s => {
        const allNames = [s.name, s.SuitName, ...(s.names ? Object.values(s.names) : [])].join(" ").toLowerCase();
        return allNames.includes(q) || (s.id && s.id.toString().includes(q));
    });
    renderChunk(true); // Reset and show new filtered batch
}

function filterSuit() {
    const f = document.getElementById("filter").value;
    displayedSuits = f === "All" ? suits : suits.filter(s => s.category === f);
    renderChunk(true);
}

/* =========================
   🧾 MODAL & CART (Unchanged Logic)
========================= */
function openSuit(suit) {
    currentSuit = suit;
    document.getElementById("modal").style.display = "flex";
    document.getElementById("suitTitle").textContent = suit.names?.en || suit.name || "Suit Parts";

    const grid = document.getElementById("partsGrid");
    grid.innerHTML = "<div style='grid-column: 1 / -1; text-align: center;'>Scanning...</div>";

    let loadedAny = false;
    suit.parts.forEach(id => {
        VARIANTS.forEach(v => {
            findImage(id, false, v, (foundUrl) => {
                if (!loadedAny) { grid.innerHTML = ""; loadedAny = true; }
                const partCard = document.createElement("div");
                partCard.className = "part-card";
                const label = v === "" ? id : `${id}${v}`;
                partCard.innerHTML = `
                    <img src="${foundUrl}" loading="lazy">
                    <div style="font-size:11px; margin:4px 0;">${label}</div>
                    <div class="btn-group">
                        <button class="small-btn" style="padding: 5px 8px; font-size: 10px;" onclick="addToCart('${label}', '${foundUrl}')">Add</button>
                        <button class="small-btn" style="padding: 5px 8px; font-size: 10px;" onclick="downloadDirect('${foundUrl}', '${label}.png')">DL</button>
                    </div>
                `;
                grid.appendChild(partCard);
            });
        });
    });
}

function addToCart(id, url) { cart.set(id, url); saveCart(); updateCartUI(); }
function removeFromCart(id) { cart.delete(id); saveCart(); updateCartUI(); }
function saveCart() { localStorage.setItem("ln_cart", JSON.stringify([...cart])); }
function loadCart() { 
    const saved = localStorage.getItem("ln_cart"); 
    if (saved) { cart = new Map(JSON.parse(saved)); updateCartUI(); } 
}
function updateCartUI() {
    document.getElementById("cartCount").textContent = cart.size;
    const container = document.getElementById("cartItems");
    container.innerHTML = "";
    cart.forEach((url, id) => {
        container.innerHTML += `
            <div class="cart-item">
                <img src="${url}">
                <span style="font-size:12px; font-weight: bold;">${id}</span>
                <span class="trash" onclick="removeFromCart('${id}')">🗑️</span>
            </div>`;
    });
}

async function downloadDirect(url, filename) {
    const res = await fetch(url);
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
async function downloadSuit() {
    const zip = new JSZip();
    const imgs = document.querySelectorAll("#partsGrid img");
    if (imgs.length === 0) return alert("No images to download!");
    for (let img of imgs) {
        const res = await fetch(img.src);
        zip.file(img.src.split('/').pop(), await res.blob());
    }
    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `${currentSuit.name || 'Suit'}.zip`;
        a.click();
    });
}
async function downloadCart() {
    if (cart.size === 0) return alert("Cart is empty!");
    const zip = new JSZip();
    for (let [id, url] of cart.entries()) {
        const res = await fetch(url);
        zip.file(`${id}.png`, await res.blob());
    }
    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "Nikki_Cart.zip";
        a.click();
    });
}

function toggleCart() {
    const p = document.getElementById("cartPanel");
    p.style.display = p.style.display === "block" ? "none" : "block";
}
function closeModal() { document.getElementById("modal").style.display = "none"; }
</script>
</body>
</html>
