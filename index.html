<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Archives</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r/mn-res/main/head_12.png">
    <style>
/* ===== THEMES & VARIABLES ===== */
:root {
  --nikki-pink: #ff85ba;
  --soft-blush: #ffe4f0;
  --lavender: #bd93f9;
  --glass-bg: rgba(255, 255, 255, 0.4);
  --glass-border: rgba(255, 255, 255, 0.6);
  --text-main: #5d4157;
}

/* ===== GLOBAL STYLES ===== */
body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: 
    radial-gradient(circle at top right, #fff0f6, transparent),
    radial-gradient(circle at bottom left, #f3e8ff, transparent),
    #ffe4f0;
  background-attachment: fixed;
  color: var(--text-main);
}

/* ===== HEADER ===== */
header {
  padding: 25px;
  text-align: center;
  font-family: "Georgia", serif;
  font-weight: bold;
  font-size: 28px;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  color: var(--nikki-pink);
  text-shadow: 2px 2px 4px rgba(255, 133, 186, 0.2);
  border-bottom: 2px solid var(--glass-border);
  letter-spacing: 2px;
}

/* ===== TOP BAR (Search & Filter) ===== */
.topbar {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 20px;
  flex-wrap: wrap;
}

input, select {
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  color: var(--text-main);
  outline: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
}

input:focus, select:focus {
  background: white;
  border-color: var(--nikki-pink);
  transform: scale(1.02);
}

/* ===== CUTE BUTTONS ===== */
.cart-btn, .small-btn, .download-all {
  background: linear-gradient(135deg, #ff85ba, #ffb3d9);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 4px 15px rgba(255, 133, 186, 0.4);
}

.cart-btn:hover, .small-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 25px rgba(255, 133, 186, 0.6);
}

/* ===== SUIT GRID ===== */
.suit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 25px;
  padding: 25px;
}

/* ===== SUIT CARD ===== */
.suit-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.4s ease;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.suit-card:hover {
  background: rgba(255, 255, 255, 0.8);
  transform: scale(1.05) rotate(1deg);
  border-color: var(--nikki-pink);
}

.suit-card img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  border-radius: 18px;
  margin-bottom: 10px;
}

/* ===== MODAL (Glassmorphism) ===== */
.modal {
  display: none; /* Hidden by default */
  position: fixed; 
  z-index: 1000; /* Sits on top of everything */
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 182, 193, 0.3); /* Soft pink tint */
  backdrop-filter: blur(10px); /* The "Glass" effect */
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255, 255, 255, 0.9);
  padding: 30px;
  border-radius: 30px;
  width: 90%;
  max-width: 900px;
  max-height: 85vh; /* Prevents it from going off-screen */
  overflow-y: auto; /* Scrollable if there are many parts */
  position: relative;
  border: 2px solid white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* ===== PART CARDS ===== */
/* ===== PARTS GRID (Inside Modal) ===== */
.parts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

/* ===== PART CARDS ===== */
.part-card {
  background: white;
  border-radius: 20px;
  padding: 10px;
  border: 1px solid #ffe4f0;
  transition: transform 0.2s;
  display: flex;
  flex-direction: column; /* Stacks the image, text, and buttons vertically */
  align-items: center;
}

.part-card:hover {
  transform: scale(1.05);
  border-color: var(--nikki-pink);
  box-shadow: 0 5px 15px rgba(255, 133, 186, 0.2);
}

.part-card img {
  width: 100%;
  height: 130px; /* This makes every single preview exactly the same height! */
  object-fit: contain; /* Scales the image down to fit the box perfectly */
  background: radial-gradient(#fff, #ffeef6);
  border-radius: 15px;
  margin-bottom: 8px;
}

/* Keeps the buttons neat and centered */
.btn-group {
  display: flex;
  gap: 5px;
  width: 100%;
  justify-content: center;
}
/* ===== CART PANEL ===== */
.cart-panel {
  display: none;
  position: fixed;
  right: 0;
  top: 0;
  width: 320px;
  height: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-left: 3px solid var(--nikki-pink);
  box-shadow: -10px 0 30px rgba(0,0,0,0.05);
  padding: 25px;
  z-index: 2000; /* Even higher than the modal */
  box-sizing: border-box;
}

.cart-item {
  border-bottom: 1px solid #ffd1e3;
  padding: 10px 0;
}
    </style>
</head>
<body>

<header>HDA Archives</header>

<div class="topbar">
    <input type="text" id="search" placeholder="Search suit..." oninput="searchSuit()">
    <select id="filter" onchange="filterSuit()">
    <option value="All">All</option>
    <option value="Classic">Classic</option>
    <option value="Luxury">Luxury</option>
    <option value="Time Memories">Time Memories</option>
    <option value="Apple">Apple</option>
    <option value="Lilith">Lilith</option>
    <option value="Cloud">Cloud</option>
    <option value="Pigeon">Pigeon</option>
    <option value="North">North</option>
    <option value="Wasteland">Wasteland</option>
    <option value="Ruin">Ruin</option>
    <option value="Story Suits">Story Suits</option>
    <option value="Festivals">Festivals</option>
    <option value="Troupe">Troupe</option>
    <option value="4 Seasons">4 Seasons</option>
    <option value="Imperial Palace">Imperial Palace</option>
    <option value="Happiness">Happiness</option>
    <option value="Wonder Museum">Wonder Museum</option>
    <option value="Fairytale">Fairytale</option>
    <option value="Gallery">Gallery</option>
  </select>
    <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

<div class="suit-grid" id="suitGrid"></div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="suitTitle"></h2>
        <button class="small-btn" style="margin-bottom:10px; padding: 10px;" onclick="downloadSuit()">Download Full Suit</button>
        <div class="parts-grid" id="partsGrid"></div>
    </div>
</div>

<!-- Cart Panel -->
<div class="cart-panel" id="cartPanel">
    <h3>My Cart</h3>
    <div id="cartItems"></div>
    <button class="small-btn" style="width:100%; margin-top:10px; padding:10px;" onclick="downloadCart()">Download Cart</button>
    <button class="small-btn" style="width:100%; margin-top:5px; background:#ccc;" onclick="toggleCart()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let suits = [];
let cart = new Map();
let currentSuit = null;

const BASE_USER = "https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r";

// 📝 Add your repository names here in order of priority!
const REPOS = ["mn-res-b1", "mn-res-b2", "mn-res"]; 

const VARIANTS = ["", "-1", "-2", "-3", "-4", "-5", "-6", "-7", "-8", "-9", "-13", "-101", "-201", "-301", "-701", "-901"];

/* =========================
   🔍 SMART FINDER
========================= */

// This function tries every repo in the REPOS list until it finds the image
function findImage(id, isSuit, variant, callback) {
    const folder = isSuit ? "suits" : "parts";
    let repoIndex = 0;

    function tryNextRepo() {
        if (repoIndex >= REPOS.length) return; // Not found anywhere

        const url = `${BASE_USER}/${REPOS[repoIndex]}/main/images/${folder}/${id}${variant}.png`;
        const img = new Image();
        
        img.onload = () => callback(url); // Found it!
        img.onerror = () => {
            repoIndex++;
            tryNextRepo(); // Try the next bucket
        };
        img.src = url;
    }
    tryNextRepo();
}

/* =========================
   📦 LOAD DATA
========================= */

fetch("data.json")
    .then(r => r.json())
    .then(data => {
        suits = data;
        displaySuits(suits);
        loadCart();
    })
    .catch(err => console.error("Could not load data.json", err));

/* =========================
    🖼 SUIT GRID
========================= */

function displaySuits(list) {
    const grid = document.getElementById("suitGrid");
    grid.innerHTML = "";

    list.forEach(s => {
        if (!s || !s.id) return;
        
        // Find the suit cover image in any bucket
        findImage(s.id, true, "", (foundUrl) => {
            createCard(s, foundUrl);
        });
    });
}

/* =========================
    🖼 SUIT GRID (Fixed Name Logic)
========================= */

function createCard(s, imgSrc) {
    const grid = document.getElementById("suitGrid");
    const card = document.createElement("div");
    card.className = "suit-card";

    // This checks every possible place a name could be hiding!
    const name = s.names?.en || s.names?.cn || s.names?.jp || s.name || s.SuitName || "Unnamed Suit";

    card.innerHTML = `
        <img src="${imgSrc}" loading="lazy">
        <div style="margin-top:8px; font-weight:bold;">${name}</div>
    `;
    card.onclick = () => openSuit(s);
    grid.appendChild(card);
}

/* =========================
   🧾 OPEN SUIT (Fixed Name Logic)
========================= */

function openSuit(suit) {
    currentSuit = suit;
    document.getElementById("modal").style.display = "flex";
    
    // Check all name variants here too!
    const suitName = suit.names?.en || suit.names?.cn || suit.names?.jp || suit.name || suit.SuitName || "Suit Parts";
    document.getElementById("suitTitle").textContent = suitName;

    const grid = document.getElementById("partsGrid");
    grid.innerHTML = "Nikki's Scanning Wardrobe...";

    let loadedAny = false;

    suit.parts.forEach(id => {
        VARIANTS.forEach(v => {
            findImage(id, false, v, (foundUrl) => {
                if (!loadedAny) { grid.innerHTML = ""; loadedAny = true; }
                
                const partCard = document.createElement("div");
                partCard.className = "part-card";
                const label = v === "" ? id : `${id}${v}`;
                
                partCard.innerHTML = `
                    <img src="${foundUrl}" loading="lazy">
                    <div style="font-size:10px; margin:4px 0;">${label}</div>
                    <div class="btn-group">
                        <button class="small-btn" onclick="addToCart('${label}', '${foundUrl}')">Add</button>
                        <button class="small-btn" onclick="downloadDirect('${foundUrl}', '${label}.png')">DL</button>
                    </div>
                `;
                grid.appendChild(partCard);
            });
        });
    });

    setTimeout(() => { if (!loadedAny) grid.innerHTML = "Nikki got distracted... (Reopen me again to see clothing parts!)"; }, 3000);
}

/* =========================
   🛒 CART LOGIC
========================= */

function addToCart(id, url) {
    cart.set(id, url);
    saveCart();
    updateCartUI();
}

function removeFromCart(id) {
    cart.delete(id);
    saveCart();
    updateCartUI();
}

function saveCart() {
    localStorage.setItem("ln_cart", JSON.stringify([...cart]));
}

function loadCart() {
    const saved = localStorage.getItem("ln_cart");
    if (saved) {
        cart = new Map(JSON.parse(saved));
        updateCartUI();
    }
}

function updateCartUI() {
    document.getElementById("cartCount").textContent = cart.size;
    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    cart.forEach((url, id) => {
        const item = document.createElement("div");
        item.className = "cart-item";
        item.innerHTML = `
            <img src="${url}">
            <span style="font-size:12px;">${id}</span>
            <span class="trash" onclick="removeFromCart('${id}')">🗑️</span>
        `;
        container.appendChild(item);
    });
}

/* =========================
   📦 DOWNLOADS
========================= */

async function downloadDirect(url, filename) {
    const res = await fetch(url);
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

async function downloadSuit() {
    const zip = new JSZip();
    const imgs = document.querySelectorAll("#partsGrid img");
    
    if (imgs.length === 0) return alert("No images to download!");

    for (let img of imgs) {
        const res = await fetch(img.src);
        const blob = await res.blob();
        const name = img.src.split('/').pop();
        zip.file(name, blob);
    }

    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `${currentSuit.name}.zip`;
        a.click();
    });
}

async function downloadCart() {
    if (cart.size === 0) return alert("Cart is empty!");
    const zip = new JSZip();

    for (let [id, url] of cart.entries()) {
        const res = await fetch(url);
        const blob = await res.blob();
        zip.file(`${id}.png`, blob);
    }

    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "Nikki_Cart.zip";
        a.click();
    });
}

/* =========================
   UI HELPERS
========================= */

function searchSuit() {
    const q = document.getElementById("search").value.toLowerCase();
    
    const filtered = suits.filter(s => {
        // Get all possible name values into one string to search against
        const allNames = [
            s.name, 
            s.SuitName, 
            ...(s.names ? Object.values(s.names) : [])
        ].join(" ").toLowerCase();

        return allNames.includes(q) || s.id.toString().includes(q);
    });
    
    displaySuits(filtered);
}

function filterSuit() {
    const f = document.getElementById("filter").value;
    const filtered = f === "all" ? suits : suits.filter(s => s.category === f);
    displaySuits(filtered);
}

function toggleCart() {
    const p = document.getElementById("cartPanel");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
