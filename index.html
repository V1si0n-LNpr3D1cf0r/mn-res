<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Archives</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r/mn-res/main/head_12.png">

    <style>
:root {
  --nikki-pink: #ff85ba;
  --soft-blush: #ffe4f0;
  --glass-bg: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(255, 255, 255, 0.6);
  --text-main: #5d4157;
}

body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at top right, #fff0f6, transparent), #ffe4f0;
  background-attachment: fixed;
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
}

header {
  padding: 20px;
  text-align: center;
  font-family: "Georgia", serif;
  font-weight: bold;
  font-size: 24px;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(8px);
  color: var(--nikki-pink);
  border-bottom: 2px solid var(--glass-border);
}

.topbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  flex-wrap: wrap;
}

input, select {
  padding: 10px 15px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: white;
  color: var(--text-main);
  outline: none;
  font-size: 14px;
}

.cart-btn, .small-btn {
  background: linear-gradient(135deg, #ff85ba, #ffb3d9);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(255, 133, 186, 0.3);
}

.suit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* Restores the stylish card look */
.suit-card {
  background: rgba(255, 255, 255, 0.4); 
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 20px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  order: 100;
  opacity: 0.5; /* "Ghost" mode for empty cards */
  transition: all 0.3s ease;
}

/* Stylish card when image loads */
.suit-card.has-image {
  order: 1; 
  opacity: 1 !important; 
  background: white;
  box-shadow: 0 8px 20px rgba(255, 133, 186, 0.15);
  border: 1px solid #fff;
}

.suit-card img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  border-radius: 12px;
  margin-bottom: 8px;
  background: transparent; /* OG colors stay pure */
}

/* Fixes the "X" button position */
.close-btn {
  position: absolute; /* Changed from sticky */
  top: 15px;
  right: 15px;
  font-size: 28px;
  font-weight: bold;
  color: var(--nikki-pink);
  cursor: pointer;
  z-index: 1001;
  background: #fff0f6; /* Soft pink background */
  width: 40px;
  height: 40px;
  line-height: 38px;
  text-align: center;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 182, 193, 0.3);
  backdrop-filter: blur(10px);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255, 255, 255, 0.95);
  padding: 20px;
  border-radius: 25px;
  width: 95%;
  max-width: 900px;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}


.parts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.part-card {
  background: white;
  border-radius: 15px;
  padding: 10px;
  border: 1px solid #ffe4f0;
  text-align: center;
  box-shadow: 0 4px 10px rgba(255, 133, 186, 0.1);
}

.part-card img {
  width: 100%;
  height: 100px;
  object-fit: contain;
  margin-bottom: 5px;
}

.btn-group {
  display: flex;
  gap: 5px;
  width: 100%;
  justify-content: center;
}

.cart-panel {
  display: none;
  position: fixed;
  right: 0;
  top: 0;
  width: 100%;
  max-width: 320px;
  height: 100%;
  background: white;
  border-left: 3px solid var(--nikki-pink);
  padding: 20px;
  z-index: 2000;
  box-sizing: border-box;
  overflow-y: auto;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #ffd1e3;
  padding: 10px 0;
}

.cart-item img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  flex-shrink: 0;
}

.trash {
  cursor: pointer;
  margin-left: auto;
}

@media (max-width: 600px) {
  .parts-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 12px;
  }

  .part-card img {
    height: 90px;
  }

  .btn-group .small-btn {
    flex: 1;
    font-size: 11px;
    padding: 8px 2px;
  }

  .modal-content {
    padding: 15px;
    width: 92%;
  }

  #suitTitle {
    font-size: 18px;
    margin-right: 35px;
  }
}

.mobile-notice {
    font-size: 12px;
    font-family: sans-serif;
    font-weight: normal;
    color: #5d4157;
    opacity: 0.8;
    margin-top: 8px;
    display: block;
    letter-spacing: 0.5px;
}

.suit-card div {
  margin-top: 8px;
  font-weight: bold;
  font-size: 14px;
  color: var(--nikki-pink);
  transition: color 0.3s ease;
}

.suit-card:hover div {
  color: #ff5c9d;
}
    </style>
</head>
<body>

<header>
    HDA Archives
    <div class="mobile-notice">Best viewed using "Desktop Site" on mobile devices</div>
</header>

<div class="topbar">
    <input type="text" id="search" placeholder="Search suit..." oninput="searchSuit()">
    <select id="filter" onchange="filterSuit()">
    <option value="All">All</option>
    <option value="Classic">Classic</option>
    <option value="Luxury">Luxury</option>
    <option value="Time Memories">Time Memories</option>
    <option value="Apple">Apple</option>
    <option value="Lilith">Lilith</option>
    <option value="Cloud">Cloud</option>
    <option value="Pigeon">Pigeon</option>
    <option value="North">North</option>
    <option value="Wasteland">Wasteland</option>
    <option value="Ruin">Ruin</option>
    <option value="Story Suits">Story Suits</option>
    <option value="Festivals">Festivals</option>
    <option value="Troupe">Troupe</option>
    <option value="4 Seasons">4 Seasons</option>
    <option value="Imperial Palace">Imperial Palace</option>
    <option value="Happiness">Happiness</option>
    <option value="Wonder Museum">Wonder Museum</option>
    <option value="Fairytale">Fairytale</option>
    <option value="Gallery">Gallery</option>
  </select>
    <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

<div class="suit-grid" id="suitGrid"></div>

<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">

        <span class="close-btn" onclick="closeModal()">&times;</span>

        <h2 id="suitTitle"></h2>
        <button class="small-btn" style="margin-bottom:10px; padding: 10px;" onclick="downloadSuit()">Download Full Suit</button>
        <div class="parts-grid" id="partsGrid"></div>
    </div>
</div>


<div class="cart-panel" id="cartPanel">
    <h3>My Cart</h3>
    <div id="cartItems"></div>
    <button class="small-btn" style="width:100%; margin-top:10px; padding:10px;" onclick="downloadCart()">Download Cart</button>
    <button class="small-btn" style="width:100%; margin-top:5px; background:#ccc;" onclick="toggleCart()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let suits = [];
let cart = new Map();
let currentSuit = null;

const BASE_USER = "https://raw.githubusercontent.com/V1si0n-LNpr3D1cf0r";
const REPOS = ["mn-res-b1", "mn-res-b2", "mn-res-b3"]; 
const VARIANTS = ["-1", "-2", "-3", "-4", "-5", "-6", "-7", "-8", "-9", "-13", "-101", "-201", "-301", "-701", "-901"];

const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            const suitId = img.dataset.id;
            const card = img.closest('.suit-card');
            
            findImage(suitId, true, "", (foundUrl) => {
                img.src = foundUrl;
                img.style.opacity = 1;
                if (card) card.classList.add('has-image');
            });
            
            observer.unobserve(img);
        }
    });
}, { rootMargin: "100px" });

function findImage(id, isSuit, variant, callback) {
    const folder = isSuit ? "suits" : "parts";
    let repoIndex = 0;

    function tryNextRepo() {
        if (repoIndex >= REPOS.length) return;

        const url = `${BASE_USER}/${REPOS[repoIndex]}/main/images/${folder}/${id}${variant}.png`;
        const img = new Image();
        
        img.onload = () => callback(url);
        img.onerror = () => {
            repoIndex++;
            tryNextRepo();
        };
        img.src = url;
    }
    tryNextRepo();
}

fetch("data.json")
    .then(r => r.json())
    .then(data => {
        suits = data;
        displaySuits(suits);
        loadCart();
    })
    .catch(err => console.error("Could not load data.json", err));

function displaySuits(list) {
    const grid = document.getElementById("suitGrid");
    grid.innerHTML = "";

    list.forEach(s => {
        if (!s || !s.id) return;
        createCard(s);
    });
}

function createCard(s) {
    const grid = document.getElementById("suitGrid");
    const card = document.createElement("div");
    card.className = "suit-card";

    const name = s.names?.en || s.names?.cn || s.names?.jp || s.name || s.SuitName || "Unnamed Suit";

    card.innerHTML = `
        <img data-id="${s.id}" style="opacity: 0; transition: opacity 0.4s ease-in-out;" alt="${name}">
        <div style="margin-top:8px; font-weight:bold; font-size: 14px;">${name}</div>
    `;
    card.onclick = () => openSuit(s);
    grid.appendChild(card);

    const imgElement = card.querySelector('img');
    imageObserver.observe(imgElement);
}

function openSuit(suit) {
    currentSuit = suit;
    document.getElementById("modal").style.display = "flex";
    
    const suitName = suit.names?.en || suit.names?.cn || suit.names?.jp || suit.name || suit.SuitName || "Suit Parts";
    document.getElementById("suitTitle").textContent = suitName;

    const grid = document.getElementById("partsGrid");
    grid.innerHTML = "<div style='grid-column: 1 / -1; text-align: center; color: var(--nikki-pink); font-weight: bold;'>Nikki's Scanning Wardrobe...</div>";

    let loadedAny = false;

    suit.parts.forEach(id => {
        VARIANTS.forEach(v => {
            findImage(id, false, v, (foundUrl) => {
                if (!loadedAny) { grid.innerHTML = ""; loadedAny = true; }
                
                const partCard = document.createElement("div");
                partCard.className = "part-card";
                const label = v === "" ? id : `${id}${v}`;
                
                partCard.innerHTML = `
                    <img src="${foundUrl}" loading="lazy">
                    <div style="font-size:11px; margin:4px 0; font-weight: bold;">${label}</div>
                    <div class="btn-group">
                        <button class="small-btn" style="padding: 6px 12px; font-size: 11px;" onclick="addToCart('${label}', '${foundUrl}')">Add</button>
                        <button class="small-btn" style="padding: 6px 12px; font-size: 11px;" onclick="downloadDirect('${foundUrl}', '${label}.png')">DL</button>
                    </div>
                `;
                grid.appendChild(partCard);
            });
        });
    });

    setTimeout(() => { 
        if (!loadedAny) grid.innerHTML = "<div style='grid-column: 1 / -1; text-align: center;'>Nikki got distracted... (Reopen me again to see clothing parts! ...or wait since she's getting the items up!)</div>"; 
    }, 4000);
}

function addToCart(id, url) {
    cart.set(id, url);
    saveCart();
    updateCartUI();
}

function removeFromCart(id) {
    cart.delete(id);
    saveCart();
    updateCartUI();
}

function saveCart() {
    localStorage.setItem("ln_cart", JSON.stringify([...cart]));
}

function loadCart() {
    const saved = localStorage.getItem("ln_cart");
    if (saved) {
        cart = new Map(JSON.parse(saved));
        updateCartUI();
    }
}

function updateCartUI() {
    document.getElementById("cartCount").textContent = cart.size;
    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    cart.forEach((url, id) => {
        const item = document.createElement("div");
        item.className = "cart-item";
        item.innerHTML = `
            <img src="${url}">
            <span style="font-size:13px; font-weight: bold;">${id}</span>
            <span class="trash" onclick="removeFromCart('${id}')">🗑️</span>
        `;
        container.appendChild(item);
    });
}

async function downloadDirect(url, filename) {
    const res = await fetch(url);
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

async function downloadSuit() {
    const zip = new JSZip();
    const imgs = document.querySelectorAll("#partsGrid img");
    
    if (imgs.length === 0) return alert("No images to download!");

    for (let img of imgs) {
        const res = await fetch(img.src);
        const blob = await res.blob();
        const name = img.src.split('/').pop();
        zip.file(name, blob);
    }

    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `${currentSuit.name || 'Suit'}.zip`;
        a.click();
    });
}

async function downloadCart() {
    if (cart.size === 0) return alert("Cart is empty!");
    const zip = new JSZip();

    for (let [id, url] of cart.entries()) {
        const res = await fetch(url);
        const blob = await res.blob();
        zip.file(`${id}.png`, blob);
    }

    zip.generateAsync({type:"blob"}).then(content => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "Nikki_Cart.zip";
        a.click();
    });
}

function searchSuit() {
    const q = document.getElementById("search").value.toLowerCase();
    
    const filtered = suits.filter(s => {
        const allNames = [
            s.name, 
            s.SuitName, 
            ...(s.names ? Object.values(s.names) : [])
        ].join(" ").toLowerCase();

        return allNames.includes(q) || (s.id && s.id.toString().includes(q));
    });
    
    displaySuits(filtered);
}

function filterSuit() {
    const f = document.getElementById("filter").value;
    const filtered = f === "All" ? suits : suits.filter(s => s.category === f);
    displaySuits(filtered);
}

function toggleCart() {
    const p = document.getElementById("cartPanel");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
